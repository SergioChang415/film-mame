<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Film Archive</title>

  <style>

    /* reset some basic stuff */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0D0A08;
      color: #F2E8D9;
      font-family: Georgia, serif;
    }

    /* ---- navigation bar at the top ---- */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      background: linear-gradient(to bottom, rgba(13,10,8,0.9), transparent);
    }

    .navbar .logo {
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #C9A84C;
      text-decoration: none;
    }

    .navbar ul {
      list-style: none;
      display: flex;
      gap: 30px;
    }

    .navbar ul li a {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #F2E8D9;
      text-decoration: none;
      opacity: 0.6;
    }

    .navbar ul li a:hover {
      opacity: 1;
    }

    /* ---- hero / homepage section ---- */
    .hero-section {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* background image */
    .hero-bg {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url('https://raw.githubusercontent.com/SergioChang415/film-mame/main/itmfl.jpg');
      background-size: cover;
      background-position: center;
      background-color: #1a0a06;
    }

    /* dark overlay on top of background */
    .hero-bg::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to bottom, rgba(13,10,8,0.4), rgba(13,10,8,0.65));
      z-index: 1;
    }

    /* red vertical line on the right side */
    .red-line {
      position: absolute;
      right: 23%;
      top: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, transparent, #8B1A1A 15%, #8B1A1A 85%, transparent);
      opacity: 0.5;
      z-index: 2;
    }

    /* text content in the middle */
    .hero-text {
      position: relative;
      z-index: 3;
      text-align: center;
    }

    .hero-text .small-label {
      font-size: 10px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #C9A84C;
      opacity: 0.8;
      margin-bottom: 15px;
    }

    .hero-text h1 {
      font-size: 90px;
      font-weight: 400;
      font-style: italic;
      color: #F2E8D9;
      line-height: 1;
      text-shadow: 0 0 80px rgba(139,26,26,0.4);
      margin-bottom: 15px;
    }

    .hero-text .chinese-title {
      font-size: 16px;
      letter-spacing: 4px;
      color: #C9A84C;
      margin-bottom: 8px;
    }

    .hero-text .categories-label {
      font-size: 11px;
      letter-spacing: 3px;
      color: #F2E8D9;
      opacity: 0.35;
      margin-bottom: 50px;
    }

    /* the three category buttons */
    .category-buttons {
      display: flex;
      border: 1px solid rgba(201,168,76,0.3);
      position: relative;
      z-index: 3;
      margin-top: 20px;
    }

    .category-buttons button {
      padding: 15px 45px;
      font-family: Georgia, serif;
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #F2E8D9;
      opacity: 0.6;
      background: transparent;
      border: none;
      border-right: 1px solid rgba(201,168,76,0.3);
      cursor: pointer;
    }

    .category-buttons button:last-child {
      border-right: none;
    }

    .category-buttons button:hover {
      opacity: 1;
      background: rgba(201,168,76,0.07);
    }

    /* scroll hint at the bottom */
    .scroll-hint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0.35;
      animation: fadeUpDown 2.5s ease-in-out infinite;
    }

    .scroll-hint span {
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .scroll-hint .line {
      width: 1px;
      height: 36px;
      background-color: #C9A84C;
    }

    @keyframes fadeUpDown {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.7; }
    }

    /* responsive for mobile */
    @media (max-width: 600px) {
      .navbar {
        padding: 15px 20px;
      }
      .hero-text h1 {
        font-size: 50px;
      }
      .category-buttons {
        flex-direction: column;
        width: 85%;
      }
      .category-buttons button {
        border-right: none;
        border-bottom: 1px solid rgba(201,168,76,0.3);
      }
      .category-buttons button:last-child {
        border-bottom: none;
      }
    }

  </style>
</head>
<body>

  <!-- navigation -->
  <nav class="navbar">
    <a class="logo" href="index.html">Film Archive</a>
    <ul>
      <li><a href="colour.html">Colour</a></li>
      <li><a href="light.html">Light & Shadow</a></li>
      <li><a href="composition.html">Composition</a></li>
    </ul>
  </nav>

  <!-- homepage hero -->
  <div class="hero-section">

    <!-- background with overlay -->
    <div class="hero-bg"></div>

    <!-- vertical red line -->
    <div class="red-line"></div>

    <!-- main text -->
    <div class="hero-text">
      <p class="small-label">A Visual Language Study</p>
      <h1>Film Archive</h1>
      <p class="chinese-title">电影视觉语言研究</p>
      <p class="categories-label">Colour · Light · Composition</p>
    </div>

    <!-- buttons to go to each section -->
    <div class="category-buttons">
      <button onclick="location.href='colour.html'">01 — Colour</button>
      <button onclick="location.href='light.html'">02 — Light & Shadow</button>
      <button onclick="location.href='composition.html'">03 — Composition</button>
    </div>

    <!-- scroll indicator -->
    <div class="scroll-hint">
      <span>Enter</span>
      <div class="line"></div>
    </div>

  </div>

</body>
</html>
